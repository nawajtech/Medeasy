name: Deploy Production

on:
  push:
    branches:
      - staging

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # Merge staging into main
      - name: Merge Staging into Main
        run: |
          git fetch origin
          git checkout main
          git merge origin/staging --no-edit
          git push origin main

      # Verify Secrets
      - name: Verify Secrets
        run: |
          [ -n "${{ secrets.EC2_HOST }}" ] || (echo "EC2_HOST missing" && exit 1)
          [ -n "${{ secrets.EC2_USERNAME }}" ] || (echo "EC2_USERNAME missing" && exit 1)
          [ -n "${{ secrets.EC2_PORT }}" ] || (echo "EC2_PORT missing" && exit 1)
          [ -n "${{ secrets.EC2_SSH_KEY }}" ] || (echo "EC2_SSH_KEY missing" && exit 1)

      # Deploy to EC2
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e

            echo "=================================="
            echo "Starting Deployment"
            echo "=================================="

            whoami
            pwd

            cd /var/www/Medeasy

            echo "Updating Repository..."

            git fetch --all --prune
            git checkout main
            git reset --hard origin/main
            git clean -fd

            git status
            git log --oneline -1

            ###################################
            # Laravel Backend
            ###################################

            echo "Deploying Laravel..."

            cd backand

            sudo chown -R ubuntu:www-data storage bootstrap/cache

            sudo chmod -R 775 storage bootstrap/cache

            sudo find storage -type f -exec chmod 664 {} \;
            sudo find bootstrap/cache -type f -exec chmod 664 {} \;

            composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

            php artisan storage:link || true

            php artisan migrate --force

            php artisan optimize:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R www-data:www-data storage bootstrap/cache

            ###################################
            # React Frontend
            ###################################

            echo "Deploying React..."

            cd ../frontend

            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi

            npm run build

            ###################################
            # Restart Services
            ###################################

            echo "Restarting Services..."

            sudo systemctl reload php8.5-fpm
            sudo systemctl reload nginx

            echo "=================================="
            echo "Deployment Completed Successfully"
            echo "=================================="
